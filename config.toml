# baseURL = ""
locale = "en-us"
title = "Michael Gleicher's Web Page"

theme = ["559Theme"]

# relativeURLs = true
# canonifyURLs = true
enableGitInfo = true

[[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = -1000

[[menu.main]]
    identifier = "Papers"
    name = "Papers"
    url = "https://graphics.cs.wisc.edu/Papers/?author=Gleicher"
    weight = 10

[[menu.main]]
    identifier = "Talks"
    name = "Talks"
    url = "/talks/"
    weight = 100

[[menu.main]]
    identifier = "Videos"
    name = "Videos"
    url = "/video/"
    weight = 110

[[menu.main]]
    identifier = "Advice"
    name = "Advice"
    url = "/pages/advice/"
    weight = 150

[Params]
post_meta = ["date","taglist","categories"]
mainSections = ["main"]
dateformat = "January, 2006"
copyright = "Michael Gleicher"
# subtitle = "Michael Gleicher's Web Page"
customCss = ["css/home.scss","css/tooltip.scss"]
assetStore = "https://graphics.cs.wisc.edu/GleicherAssets/"
top_pagination = true
themestyle = "old"
pagination.pagerSize = 12

[Params.sidebar]
home = "right"
list = "right"
single = "right"
widgets = ["lunr","sectionlinks","links","taglist"]

[Params.logo]
image = "/svg/crest.svg"

[outputs]
home = [ "HTML", "RSS", "JSON"]

[markup.goldmark.renderer]
unsafe= true

# Hugo >= 0.162 (CVE-2026-50133 fix) blocks text/html content files by default.
# content/ (site + themes) uses only Markdown and hand-authored HTML pages
# (e.g. content/Papers/index.html, themes/559Theme/content/lunr-search.html).
[security]
allowContent = ["^text/markdown$", "^text/html$"]
